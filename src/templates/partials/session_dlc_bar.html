  <!-- ─── DLC session bar ─────────────────────────────────────── -->
  <div class="session-bar dlc-theme" id="dlc-bar">
    <div class="session-status">
      <span class="bar-label">DeepLabCut (DLC)</span>
      <span class="session-dot" id="dlc-dot" data-state="none"></span>
      <div class="session-text">
        <span id="dlc-label">No active DLC project</span>
        <span class="session-meta" id="dlc-meta"></span>
      </div>
    </div>
    <div class="session-btns">
      <button class="btn-sm btn-create" id="btn-manage-dlc" title="Open DeepLabCut project manager">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Manage DLC Project
      </button>
      <button class="btn-sm btn-danger hidden" id="btn-dlc-clear" title="Clear the active DLC project session">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Clear DLC Session
      </button>
    </div>
  </div>

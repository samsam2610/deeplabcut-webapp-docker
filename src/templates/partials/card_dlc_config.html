    <section class="card dlc-theme hidden" id="dlc-project-config-card">
      <div class="config-header">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
          <div class="dlc-config-header" style="margin:0">
            <span class="dlc-config-title">DLC config.yaml</span>
            <span class="dlc-config-path" id="dlc-project-config-path"></span>
          </div>
          <button class="btn-sm" id="btn-close-dlc-config-editor" title="Close">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Close
          </button>
        </div>
      </div>
      <p class="dlc-config-subtitle">Edit the active DLC project's <code>config.yaml</code>, then save to apply changes.</p>
      <textarea id="dlc-config-editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      <div class="config-footer">
        <span id="dlc-config-save-status" class="config-save-status"></span>
        <button id="repair-dlc-config-btn" class="btn-sm"
                title="Detect and fix common YAML corruption (e.g. video paths broken across lines). Backs up the original first.">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          Repair YAML
        </button>
        <button id="save-dlc-config-btn" class="btn-sm btn-create">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save config.yaml
        </button>
      </div>
    </section>

    <section class="card dlc-theme hidden" id="create-training-dataset-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem">
        <h2>Create Training Dataset</h2>
        <button class="btn-sm" id="btn-close-create-training-dataset" title="Close">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Close
        </button>
      </div>
      <p class="subtitle">Run <code style="font-family:var(--mono);font-size:.78rem;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:.05rem .3rem">deeplabcut.create_training_dataset()</code> to generate the training splits and network config files.</p>

      <!-- Num shuffles -->
      <div class="scorer-row" style="margin-bottom:.9rem">
        <label for="ctd-num-shuffles">Num shuffles</label>
        <input type="number" id="ctd-num-shuffles" value="1" min="1" max="20" style="width:5rem" />
      </div>

      <!-- Freeze test split -->
      <div class="scorer-row" style="margin-bottom:.9rem;gap:.55rem">
        <input type="checkbox" id="ctd-freeze-split" checked style="width:1rem;height:1rem;cursor:pointer;flex-shrink:0" />
        <label for="ctd-freeze-split" style="cursor:pointer;font-size:.82rem;line-height:1.35">
          Freeze test split using DLC's
          <code style="font-family:var(--mono);font-size:.75rem;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:.05rem .3rem">mergeandsplit</code>
          <span style="display:block;font-size:.75rem;color:var(--text-dim);margin-top:.15rem">Keeps the same test set when adding more training data</span>
        </label>
      </div>

      <!-- Run button -->
      <button id="btn-run-create-training-dataset" class="btn-sm btn-create" style="width:100%;justify-content:center;padding:.5rem 1rem">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Run Create Training Dataset
      </button>
      <span id="ctd-run-status" class="fe-extract-status" style="display:block;margin-top:.35rem"></span>

      <!-- Add datasets to video list -->
      <button id="btn-ctd-add-datasets" class="btn-sm" style="width:100%;justify-content:center;padding:.5rem 1rem;margin-top:.6rem">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Sync Datasets &amp; Video List
      </button>
      <span id="ctd-add-datasets-status" class="fe-extract-status" style="display:block;margin-top:.35rem"></span>

      <!-- Progress (shown while task runs) -->
      <div id="ctd-progress" class="hidden" style="margin-top:1.2rem">
        <div class="progress-header">
          <span style="font-size:.9rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em">Processing</span>
          <span id="ctd-task-id" class="task-id-badge"></span>
        </div>
        <div class="progress-track" style="margin-top:.8rem">
          <div id="ctd-progress-bar" class="progress-fill"></div>
        </div>
        <div class="progress-meta">
          <span id="ctd-progress-stage">Queued</span>
          <span id="ctd-progress-pct">0 %</span>
        </div>
        <div class="log-panel">
          <div class="log-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            Log
          </div>
          <pre id="ctd-log-output">Waiting for output…</pre>
        </div>
      </div>

      <!-- pytorch_config.yaml editor (shown after success) -->
      <div id="ctd-pytorch-section" class="hidden" style="margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:.55rem;margin-bottom:.6rem;flex-wrap:wrap">
          <h3 style="margin:0;font-size:.95rem;font-weight:600">pytorch_config.yaml</h3>
          <div class="select-wrap" style="flex:1;min-width:12rem">
            <select id="ctd-pytorch-config-select">
              <option value="">— select config —</option>
            </select>
            <svg class="chevron" width="16" height="16" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </div>
          <button class="btn-sm" id="ctd-refresh-pytorch-btn" title="Refresh pytorch_config.yaml list">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Refresh
          </button>
        </div>
        <span class="config-path" id="ctd-pytorch-path" style="display:block;margin-bottom:.55rem;font-size:.75rem"></span>
        <textarea id="ctd-pytorch-editor" spellcheck="false" autocorrect="off" autocapitalize="off" style="width:100%;min-height:22rem;font-family:var(--mono);font-size:.78rem;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:.65rem .8rem;color:var(--text);resize:vertical"></textarea>
        <div class="config-footer" style="margin-top:.55rem">
          <span id="ctd-save-status" class="config-save-status"></span>
          <button id="ctd-save-pytorch-btn" class="btn-sm btn-create">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save pytorch_config.yaml
          </button>
        </div>
      </div>
    </section>

    <section class="card dlc-theme hidden" id="dlc-project-card">
      <h2>DeepLabCut Project Manager</h2>
      <p class="subtitle">Navigate to a DLC project folder in your user data and manage its pipeline files.</p>

      <!-- ── Folder browser ──────────────────────────────── -->
      <div id="dlc-browser-section">
        <div style="margin-bottom:.55rem">
          <label>Project source</label>
          <div class="source-btn-row" style="margin-top:.35rem">
            <button class="btn-sm btn-server-pick" id="dlc-browse-btn" title="Browse user data volume to find a DLC project folder">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
              Browse User Data
            </button>
            <span id="dlc-browse-info" class="dlc-browse-info"></span>
          </div>
        </div>

        <!-- Folder navigator (address bar + flat list) -->
        <div id="dlc-folder-nav" class="userdata-nav hidden">
          <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem">
            <input id="dlc-browse-breadcrumb" type="text" spellcheck="false" autocomplete="off"
              placeholder="/paste/a/path/here"
              style="flex:1;min-width:0;font-family:var(--mono);font-size:.75rem;color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:.25rem .45rem" />
            <button class="btn-sm" id="dlc-browse-up" style="padding:.2rem .45rem;font-size:.75rem" title="Go up one level">↑ Up</button>
          </div>
          <div id="dlc-folder-list" style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:var(--surface-2);padding:.4rem .5rem;font-size:.77rem">
            <p class="explorer-empty">Loading…</p>
          </div>
          <div style="display:flex;align-items:center;gap:.5rem;margin-top:.55rem">
            <button class="btn-sm btn-create" id="dlc-select-btn">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
              Use this folder
            </button>
            <span id="dlc-select-status" class="dlc-config-status"></span>
          </div>
        </div>
      </div>

      <!-- ── Pipeline folder manager (shown when project has config.yaml) ── -->
      <div id="dlc-pipeline-section" class="hidden" style="margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:.55rem;margin-bottom:.8rem;flex-wrap:wrap">
          <span class="config-path" id="dlc-active-path" style="flex:1;min-width:0"></span>
          <button class="btn-sm" id="dlc-refresh-btn" title="Refresh pipeline file list">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Refresh
          </button>
          <button class="btn-sm" id="dlc-download-project-btn" title="Download entire DLC project as ZIP">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="5 12 12 19 19 12"/></svg>
            Download Project
          </button>
        </div>
        <div id="dlc-pipeline-folders"></div>
      </div>

      <!-- ── No config.yaml message ────────────────────────── -->
      <div id="dlc-no-config-msg" class="hidden" style="margin-top:1.1rem;padding:.65rem .85rem;background:var(--surface-2);border:1px solid var(--border);border-radius:7px">
        <span style="font-size:.82rem;color:var(--text-dim)">No <code style="font-family:var(--mono);font-size:.78rem;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:.05rem .3rem">config.yaml</code> found in this folder. A DeepLabCut project requires a <code style="font-family:var(--mono);font-size:.78rem;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:.05rem .3rem">config.yaml</code> at its root.</span>
      </div>

      <!-- ── Frame Extractor + Labeler launch buttons ──────── -->
      <div id="dlc-frame-extract-launch" class="hidden" style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.5rem">
        <button id="btn-open-dlc-config-editor" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          <span>Edit config.yaml</span>
        </button>
        <button id="btn-open-frame-extractor" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="3"/>
            <circle cx="12" cy="12" r="3.5"/>
            <line x1="12" y1="2" x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="5" y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
          </svg>
          <span>Extract Frames</span>
        </button>
        <button id="btn-open-frame-labeler" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2" x2="12" y2="6"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="6" y2="12"/>
            <line x1="18" y1="12" x2="22" y2="12"/>
            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
            <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
            <line x1="19.07" y1="4.93" x2="16.24" y2="7.76"/>
            <line x1="7.76" y1="16.24" x2="4.93" y2="19.07"/>
          </svg>
          <span>Label Frames</span>
        </button>
        <button id="btn-open-create-training-dataset" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
          <span>Create Training Dataset</span>
        </button>
        <button id="btn-open-train-network" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <span>Train Network</span>
        </button>
        <button id="btn-open-analyze" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
          <span>Analyze Video / Frames</span>
        </button>
        <button id="btn-open-view-analyzed" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <span>View Analyzed Videos/Frames</span>
        </button>
        <button id="btn-open-annotate-video" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            <rect x="2" y="2" width="9" height="7" rx="1.5" style="display:none"/>
          </svg>
          <span>Annotate Video</span>
        </button>
        <button id="btn-open-custom-script" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
          <span>Run Custom Script</span>
        </button>
        <button id="btn-open-gpu-monitor" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <span>GPU &amp; Training Monitor</span>
          <span id="gpu-monitor-badge" style="margin-left:auto;font-size:.7rem;padding:.1rem .45rem;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);display:none">idle</span>
        </button>
      </div>
    </section>

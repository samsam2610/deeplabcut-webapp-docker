    <section class="card hidden" id="actions-card">
      <h2>Run Pipeline Step</h2>
      <p class="subtitle">Select a project folder, then run any Anipose step independently using the active session config.</p>

      <div class="field">
        <label for="folder-select">Project folder</label>
        <div class="select-wrap">
          <select id="folder-select">
            <option value="">— select a project —</option>
          </select>
          <svg class="chevron" width="16" height="16" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </div>
      </div>

      <!-- ─── Pipeline mode toggle ───────────────────────────── -->
      <div style="margin-bottom:.9rem">
        <label>Pipeline</label>
        <div class="source-btn-row">
          <button class="btn-source active" id="pipeline-btn-mediapipe">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12a4 4 0 0 1 8 0"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
            MediaPipe
          </button>
          <button class="btn-source" id="pipeline-btn-deeplabcut">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 20 2 20"/><line x1="12" y1="2" x2="12" y2="20"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
            DeepLabCut
          </button>
        </div>
      </div>

      <!-- ─── MediaPipe-only extras (scorer + preprocess buttons) ── -->
      <div id="mediapipe-extras">
        <div class="scorer-row">
          <label for="scorer-input">Scorer</label>
          <input type="text" id="scorer-input" value="User" placeholder="User" autocomplete="off" spellcheck="false" />
        </div>

        <!-- ─── Frame dimensions ────────────────────────────────── -->
        <div class="frame-dims-row">
          <label>Frame size</label>
          <div class="frame-dims-inputs">
            <input type="number" id="frame-w-input" placeholder="Width"  min="1" value="1920" />
            <span class="frame-dims-sep">×</span>
            <input type="number" id="frame-h-input" placeholder="Height" min="1" value="1080" />
            <button id="detect-dims-btn" class="btn-sm" title="Auto-detect from the first video found in the selected project">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              Detect
            </button>
            <span id="detect-dims-status" class="detect-dims-status"></span>
          </div>
        </div>

        <div class="action-grid" style="margin-bottom:.75rem">
          <button class="btn-action" data-op="organize_for_anipose" title="Organize cam folders into pose-2d/">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              <line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
            </svg>
            <span>Organize for Anipose</span>
          </button>
          <button class="btn-action" data-op="convert_mediapipe_to_dlc_csv" title="Convert .mat MediaPipe arrays to DLC-format CSV (uses frame size above)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 12a4 4 0 0 1 8 0"/><line x1="12" y1="8" x2="12" y2="12"/>
              <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            </svg>
            <span>MP → DLC CSV</span>
          </button>
          <button class="btn-action" data-op="convert_mediapipe_csv_to_h5" title="Convert CSV labeled data to DLC H5 format">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
            </svg>
            <span>CSV → H5</span>
          </button>
          <button class="btn-action" data-op="convert_3d_csv_to_mat" title="Convert filtered 3D CSVs (pose-3d-filtered/) back to .mat (uses frame size above)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
              <polyline points="16 19 21 19 21 24"/><line x1="4" y1="24" x2="21" y2="19"/>
            </svg>
            <span>3D CSV → .mat</span>
          </button>
        </div>
      </div>

      <!-- ─── Shared pipeline steps (always visible) ──────────── -->
      <div class="action-grid">
        <!-- Calibrate -->
        <button class="btn-action" data-op="calibrate" title="anipose calibrate">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
          </svg>
          <span>Calibrate</span>
        </button>

        <!-- Filter 2D -->
        <button class="btn-action" data-op="filter_2d" title="anipose filter">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>Filter 2D</span>
        </button>

        <!-- Triangulate -->
        <button class="btn-action" data-op="triangulate" title="anipose triangulate">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 22 20 2 20"/>
            <line x1="12" y1="2" x2="12" y2="20"/>
            <line x1="7" y1="12" x2="17" y2="12"/>
          </svg>
          <span>Triangulate</span>
        </button>

        <!-- Filter 3D -->
        <button class="btn-action" data-op="filter_3d" title="anipose filter-3d">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
          <span>Filter 3D</span>
        </button>
      </div>

      <!-- ─── Inspect Video ──────────────────────────────────────── -->
      <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
        <button id="inspect-video-btn" class="inspect-btn" style="width:100%;gap:.55rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
            <circle cx="11" cy="11" r="3" fill="currentColor" opacity=".25"/>
          </svg>
          <span>Inspect Video</span>
        </button>
      </div>

      <!-- ─── Operation progress (shown after a step is launched) ── -->
      <div id="operation-progress" class="hidden" style="margin-top:1.4rem">
        <div class="progress-header">
          <span id="progress-title" style="font-size:.9rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;">Processing</span>
          <span id="task-id-display" class="task-id-badge"></span>
        </div>
        <div class="progress-track" style="margin-top:.8rem">
          <div id="progress-bar" class="progress-fill"></div>
        </div>
        <div class="progress-meta">
          <span id="progress-stage">Queued</span>
          <span id="progress-pct">0 %</span>
        </div>
        <div class="log-panel">
          <div class="log-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            Log
          </div>
          <pre id="log-output">Waiting for output…</pre>
        </div>
        <button id="new-job-btn" class="btn-secondary hidden">↩ New run</button>
      </div>
    </section>

# HARD CONSTRAINTS: Skeletal bones (Limb length stability)
constraints = [
    ["11","12"], ["11","23"], ["12","24"], ["23","24"], # The Torso Box
    ["11","13"], ["13","15"], # Left Arm (Shoulder to Elbow, Elbow to Wrist)
    ["12","14"], ["14","16"]  # Right Arm (Shoulder to Elbow, Elbow to Wrist)
]

# WEAK CONSTRAINTS: Non-rigid and occluded points
constraints_weak = [
    # Face (Midline and Eyes)
    ["0","1"],["1","2"],["2","3"],["3","7"],["0","4"],["4","5"],["5","6"],["6","8"],["9","10"],
    # Left Hand
    ["15","17"],["15","19"],["15","21"],["17","19"],
    # Right Hand
    ["16","18"],["16","20"],["16","22"],["18","20"]
]

optim_chunking = false
optim_chunking_size = 1000

axes = [
    ["x", "11", "12"],  # From Left Shoulder to Right Shoulder
    ["z", "24", "12"]   # From Right Hip to Right Shoulder (Upward)
]

reference_point = "24"

[labeling]
scheme = [ [ "R-Wrist", "R-D2Base", "R-D2Mid",], [ "R-Wrist", "R-D3Base", "R-D3Mid",], [ "R-Wrist", "R-D4Base", "R-D4Mid",], [ "L-Wrist", "L-D2Base", "L-D2Mid",], [ "L-Wrist", "L-D3Base", "L-D3Mid",], [ "L-Wrist", "L-D4Base", "L-D4Mid",],]

[manual_verification]
manually_verify = false

[filter]
enabled = true
type = "medfilt"
medfilt = 13
offset_threshold = 30
score_threshold = 0.03
spline = true
n_back = 3
multiprocessing = true

[filter3d]
enabled = true
medfilt = 13
offset_threshold = 30

[calibration]
board_type = "charuco"
board_size = [ 5, 3]
board_marker_bits = 4
board_marker_dict_number = 50
board_marker_length = 38
board_square_side_length = 49
animal_calibration = false
fisheye = false

[triangulation]
cam_regex = "cam([0-9])"
ransac = false
optim = true
scale_smooth = 4
scale_length = 1.5
scale_length_weak = 0.5
reproj_error_threshold = 5
score_threshold = 0.03
n_deriv_smooth = 2


services:
  # ── Data-dir init (ensures ./data is writable by non-root users) ─
  data-init:
    image: alpine:3
    volumes:
      - ${HOST_DATA_DIR:-./data}:/data
    command: sh -c "mkdir -p /data && chmod 777 /data"
    restart: "no"

  # ── Redis Broker ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Flask Web App ───────────────────────────────────────────────
  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    ports:
      - "5000:5000"
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      # Live-reload: mount source files so edits take effect without rebuild
      - ./src/app.py:/app/app.py
      - ./templates:/app/templates
      - ./static:/app/static
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_DIR=/app/data
      - FLASK_APP=app.py
      - FLASK_DEBUG=1
    # Use Flask dev server instead of gunicorn for auto-reload
    command: flask run --debug --host=0.0.0.0 --port=5000
    depends_on:
      redis:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Celery Worker (GPU-enabled) ─────────────────────────────────
  # Based on pytorch/pytorch:2.9.1-cuda13.0-cudnn9-runtime
  # Runs as non-root 'dlcuser' (UID/GID 1000)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        UID: ${WORKER_UID:-1000}
        GID: ${WORKER_GID:-1000}
        UNAME: dlcuser
        GNAME: dlcuser
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      # Mount src/ so all .py edits take effect after worker restart
      - ./src:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_DIR=/app/data
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: celery -A tasks worker --loglevel=info --concurrency=1 --pool=solo
    depends_on:
      redis:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  redis-data:

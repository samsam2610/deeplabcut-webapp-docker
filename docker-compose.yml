services:
  # ── Data-dir init (ensures ./data and ./user-data are writable by non-root users) ─
  data-init:
    image: alpine:3
    volumes:
      - ${HOST_DATA_DIR:-./data}:/data
      - /home/sam/data-disk/Parra-Data:/user-data/Parra-Data/Disk
      - /home/sam/synology/Parra-Lab-Data:/user-data/Parra-Data/Cloud
      - /home/sam/data-mount-dir:/user-data/Martin-Data/USB
      - /home/sam/Parra-Lab-Data-NAS:/user-data/NAS-Data-Share
    command: sh -c "mkdir -p /data && chmod 777 /data && mkdir -p /user-data && chmod 777 /user-data"
    restart: "no"

  # ── Redis Broker ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Flask Web App ───────────────────────────────────────────────
  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    ports:
      - "5000:5000"
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - /home/sam/data-disk/Parra-Data:/user-data/Parra-Data/Disk
      - /home/sam/synology/Parra-Lab-Data:/user-data/Parra-Data/Cloud
      - /home/sam/data-mount-dir:/user-data/Martin-Data/USB
      - /home/sam/Parra-Lab-Data-NAS:/user-data/NAS-Data-Share
      # Live-reload: mount source files so edits take effect without rebuild
      - ./src/app.py:/app/app.py
      - ./src/templates:/app/templates
      - ./src/static:/app/static
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_DIR=/app/data
      - USER_DATA_DIR=/user-data
      - FLASK_APP=app.py
      - FLASK_DEBUG=1
    # Use Flask dev server instead of gunicorn for auto-reload
    command: flask run --debug --host=0.0.0.0 --port=5000
    depends_on:
      redis:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Celery Worker — PyTorch (GPU-enabled) ───────────────────────
  # Handles: anipose pipeline (celery queue) + pytorch DLC (pytorch queue)
  # Based on pytorch/pytorch:2.9.1-cuda13.0-cudnn9-runtime
  # Runs as non-root 'dlcuser' (UID/GID 1000)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        UID: ${WORKER_UID:-1000}
        GID: ${WORKER_GID:-1000}
        UNAME: dlcuser
        GNAME: dlcuser
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - /home/sam/data-disk/Parra-Data:/user-data/Parra-Data/Disk
      - /home/sam/synology/Parra-Lab-Data:/user-data/Parra-Data/Cloud
      - /home/sam/data-mount-dir:/user-data/Martin-Data/USB
      - /home/sam/Parra-Lab-Data-NAS:/user-data/NAS-Data-Share
      # Mount src/ so all .py edits take effect after worker restart
      - ./src:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_DIR=/app/data
      - USER_DATA_DIR=/user-data
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: celery -A tasks worker --loglevel=info --concurrency=1 --pool=solo -Q celery,pytorch
    depends_on:
      redis:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Celery Worker — TensorFlow (GPU-enabled) ────────────────────
  # Handles: legacy TF DLC projects (tensorflow queue)
  # Based on tensorflow/tensorflow:2.13.0-gpu (CUDA 11.8)
  # Runs as non-root 'dlcuser' (UID/GID 1000)
  worker-tf:
    build:
      context: .
      dockerfile: Dockerfile.worker-tf
      args:
        UID: ${WORKER_UID:-1000}
        GID: ${WORKER_GID:-1000}
        UNAME: dlcuser
        GNAME: dlcuser
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - /home/sam/data-disk/Parra-Data:/user-data/Parra-Data/Disk
      - /home/sam/synology/Parra-Lab-Data:/user-data/Parra-Data/Cloud
      - /home/sam/data-mount-dir:/user-data/Martin-Data/USB
      - /home/sam/Parra-Lab-Data-NAS:/user-data/NAS-Data-Share
      # Mount src/ so all .py edits take effect after worker restart
      - ./src:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_DIR=/app/data
      - USER_DATA_DIR=/user-data
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: celery -A tasks worker --loglevel=info --concurrency=1 --pool=solo -Q tensorflow
    depends_on:
      redis:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  redis-data:

services:
  # ── Data-dir init (ensures ./data and ./user-data are writable by non-root users) ─
  data-init:
    image: alpine:3
    volumes:
      - ${HOST_DATA_DIR:-./data}:/data
      - /home/sam/data-disk/Parra-Data:/user-data/Parra-Data/Disk
      - /home/sam/synology/Parra-Lab-Data:/user-data/Parra-Data/Cloud
      - /home/sam/data-mount-dir:/user-data/Martin-Data/USB
      - /home/sam/Parra-Lab-Data-NAS:/user-data/NAS-Data-Share
    command: sh -c "mkdir -p /data && chmod 777 /data && mkdir -p /user-data && chmod 777 /user-data"
    restart: "no"

  # ── Redis Broker ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Flask Web App ───────────────────────────────────────────────
  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    ports:
      - "5000:5000"
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - /home/sam/data-disk/Parra-Data:/user-data/Parra-Data/Disk
      - /home/sam/synology/Parra-Lab-Data:/user-data/Parra-Data/Cloud
      - /home/sam/data-mount-dir:/user-data/Martin-Data/USB
      - /home/sam/Parra-Lab-Data-NAS:/user-data/NAS-Data-Share
      # Live-reload: mount source files so edits take effect without rebuild
      - ./src/app.py:/app/app.py
      - ./src/celery_app.py:/app/celery_app.py
      - ./src/tasks.py:/app/tasks.py
      - ./src/dlc:/app/dlc
      - ./src/anipose:/app/anipose
      - ./src/routes:/app/routes
      - ./src/templates:/app/templates
      - ./src/static:/app/static
      - ./src/dlc_tapnet_tracker.py:/app/dlc_tapnet_tracker.py
      - ./src/dlc_dataset_curator.py:/app/dlc_dataset_curator.py
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "977"   # host docker group GID — grants flask access to docker.sock
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_DIR=/app/data
      - USER_DATA_DIR=/user-data
      - FLASK_APP=app.py
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-change-me-in-production}
      - APP_TOKEN=deeplabcut
      - OLLAMA_URL=http://172.26.0.1:11434
      - WEBAPP_PUBLIC_URL=http://192.168.1.13:5000
    networks:
      default:
      llm-net:
        aliases:
          - dlc-webapp
    depends_on:
      redis:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Celery Worker — PyTorch (GPU-enabled) ───────────────────────
  # Handles: anipose pipeline (celery queue) + pytorch DLC (pytorch queue)
  # Based on pytorch/pytorch:2.9.1-cuda13.0-cudnn9-runtime
  # Runs as non-root 'dlcuser' (UID/GID 1000)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        UID: ${WORKER_UID:-1000}
        GID: ${WORKER_GID:-1000}
        UNAME: dlcuser
        GNAME: dlcuser
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - /home/sam/data-disk/Parra-Data:/user-data/Parra-Data/Disk
      - /home/sam/synology/Parra-Lab-Data:/user-data/Parra-Data/Cloud
      - /home/sam/data-mount-dir:/user-data/Martin-Data/USB
      - /home/sam/Parra-Lab-Data-NAS:/user-data/NAS-Data-Share
      # Mount src/ so all .py edits take effect after worker restart
      - ./src:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_DIR=/app/data
      - USER_DATA_DIR=/user-data
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: celery -A tasks worker --loglevel=info --concurrency=1 --pool=prefork -Q celery,pytorch
    depends_on:
      redis:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # on-failure: restart only on crash (non-zero exit).
    # The worker shuts itself down cleanly (exit 0) when the queue is empty,
    # so Docker will NOT restart it automatically after idle shutdown.
    restart: on-failure

  # ── Celery Worker — TensorFlow (GPU-enabled) ────────────────────
  # Handles: legacy TF DLC projects (tensorflow queue)
  # Based on tensorflow/tensorflow:2.13.0-gpu (CUDA 11.8)
  # Runs as non-root 'dlcuser' (UID/GID 1000)
  worker-tf:
    build:
      context: .
      dockerfile: Dockerfile.worker-tf
      args:
        UID: ${WORKER_UID:-1000}
        GID: ${WORKER_GID:-1000}
        UNAME: dlcuser
        GNAME: dlcuser
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - /home/sam/data-disk/Parra-Data:/user-data/Parra-Data/Disk
      - /home/sam/synology/Parra-Lab-Data:/user-data/Parra-Data/Cloud
      - /home/sam/data-mount-dir:/user-data/Martin-Data/USB
      - /home/sam/Parra-Lab-Data-NAS:/user-data/NAS-Data-Share
      # Mount src/ so all .py edits take effect after worker restart
      - ./src:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_DIR=/app/data
      - USER_DATA_DIR=/user-data
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: celery -A tasks worker --loglevel=info --concurrency=1 --pool=prefork -Q tensorflow
    depends_on:
      redis:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # on-failure: restart only on crash (non-zero exit).
    # The worker shuts itself down cleanly (exit 0) when the queue is empty,
    # so Docker will NOT restart it automatically after idle shutdown.
    restart: on-failure

  # ── DLC-3D Support Module ───────────────────────────────────────
  dlc-3d:
    build:
      context: ../
      dockerfile: deeplabcut-webapp-docker-supports/dlc-3D/Dockerfile
    image: dlc-3d:latest
    volumes:
      - /home/sam/data-disk/Parra-Data:/user-data/Parra-Data/Disk
      - /home/sam/synology/Parra-Lab-Data:/user-data/Parra-Data/Cloud
      - /home/sam/data-mount-dir:/user-data/Martin-Data/USB
      - /home/sam/Parra-Lab-Data-NAS:/user-data/NAS-Data-Share
      # Live-reload source files without rebuild
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/app.py:/app/app.py
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/dlc_3d_bp:/app/dlc_3d_bp
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/config.py:/app/config.py
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/viewer.py:/app/viewer.py
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/templates/dlc_3d.html:/app/templates/dlc_3d.html
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/static:/app/static
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/templates/partials/card_3d_extract.html:/app/templates/partials/card_3d_extract.html
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/templates/partials/card_lp_launcher.html:/app/templates/partials/card_lp_launcher.html
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/templates/partials/card_lp_convert.html:/app/templates/partials/card_lp_convert.html
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/templates/partials/card_lp_train.html:/app/templates/partials/card_lp_train.html
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/templates/partials/card_lp_predict.html:/app/templates/partials/card_lp_predict.html
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/templates/partials/card_lp_eks.html:/app/templates/partials/card_lp_eks.html
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src/templates/partials/card_lp_jobs.html:/app/templates/partials/card_lp_jobs.html
    environment:
      - AUTH_DISABLED=true
      - DLC_3D_PORT=5050
    networks:
      - default
    restart: unless-stopped

  # ── DLC-3D GPU Worker (lightning-pose + EKS) ────────────────────
  dlc-3d-worker:
    build:
      context: ../
      dockerfile: deeplabcut-webapp-docker-supports/dlc-3D/Dockerfile.worker
    image: dlc-3d-worker:latest
    # PyTorch DataLoader workers need ample /dev/shm; the default 64 MB is too
    # small and training fails with "No space left on device" during epoch 0.
    shm_size: "4gb"
    volumes:
      - /home/sam/data-disk/Parra-Data:/user-data/Parra-Data/Disk
      - /home/sam/synology/Parra-Lab-Data:/user-data/Parra-Data/Cloud
      - /home/sam/data-mount-dir:/user-data/Martin-Data/USB
      - /home/sam/Parra-Lab-Data-NAS:/user-data/NAS-Data-Share
      - ../deeplabcut-webapp-docker-supports/dlc-3D/src:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - USER_DATA_DIR=/user-data
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: on-failure

volumes:
  redis-data:

networks:
  llm-net:
    external: true

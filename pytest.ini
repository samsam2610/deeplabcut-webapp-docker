[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# GPU tests are opt-in: run with `pytest -m gpu` or `pytest -m "not gpu"` to skip
markers =
    gpu: marks tests that require physical GPU (RTX 5090, CUDA_VISIBLE_DEVICES=0)
    e2e: end-to-end tests requiring a real DLC project + deeplabcut installed

# GPU processes MUST use RTX 5090 (Constraint #1)
# Set CUDA_VISIBLE_DEVICES=0 in subprocess env for all GPU tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

addopts = -v --tb=short -m "not gpu and not e2e"

# Disk-fill guards. The dlc_sandbox_project fixture copies a multi-GB DLC
# project on every test. Default tmp retention (keep 3 sessions of EVERYTHING)
# leaked 614 GB into /tmp/pytest-of-sam over many interrupted runs. Force
# pytest to keep only the most recent session and only tmp dirs from FAILED
# tests. Combined with the pytest_sessionfinish hook in conftest.py, this
# bounds total tmp usage to roughly "what the current run is doing".
tmp_path_retention_count = 1
tmp_path_retention_policy = failed
